<!DOCTYPE html>
<html>
<head>
    <title>Чат с {{ other.username }} — GO World</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌍 GO World</div>
        <div class="nav-links">
            <a href="/feed">Лента</a>
            <a href="/messages">💬 Сообщения</a>
            <a href="/notifications">🔔 Уведомления</a>
            <a href="/profile/{{ current_user.username }}">Профиль</a>
            <a href="/logout">Выйти</a>
        </div>
    </nav>
    
    <div class="container">
        <h2>💬 Чат с {{ other.username }}</h2>
        
        <div style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 20px; height: 400px; overflow-y: auto; margin-bottom: 20px;">
            {% for msg in messages %}
            <div style="display: flex; justify-content: {% if msg.sender_id == current_user.id %}flex-end{% else %}flex-start{% endif %}; margin-bottom: 15px;">
                <div style="background: {% if msg.sender_id == current_user.id %}#8a2be2{% else %}#302b63{% endif %}; padding: 10px 15px; border-radius: 20px; max-width: 70%;">
                    <div style="font-size: 14px;">{{ msg.content }}</div>
                    <div style="font-size: 10px; opacity: 0.6; margin-top: 5px;">{{ msg.created_at.strftime('%H:%M') }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
        
        <form method="POST" action="/send_message/{{ other.username }}" style="display: flex; gap: 10px;">
            <input type="text" name="content" placeholder="Напиши сообщение..." style="flex: 1; padding: 12px; border-radius: 25px; border: none; outline: none;" required>
            <button type="submit" style="background: #8a2be2; border: none; border-radius: 25px; padding: 12px 24px; color: white; cursor: pointer;">Отправить</button>
        </form>
    </div>
</body>
</html>
