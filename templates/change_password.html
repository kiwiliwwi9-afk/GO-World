<!DOCTYPE html>
<html>
<head>
    <title>Смена пароля — GO World</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌍 GO World</div>
        <div class="nav-links">
            <a href="/feed">Лента</a>
            <a href="/profile/{{ current_user.username }}">Профиль</a>
            <a href="/messages">💬 Сообщения</a>
            <a href="/search">🔍 Найти</a>
            <a href="/logout">Выйти</a>
        </div>
    </nav>
    
    <div class="container">
        <h2>🔑 Сменить пароль</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        
        <form method="POST">
            <input type="password" name="old_password" placeholder="Старый пароль" required>
            <input type="password" name="new_password" placeholder="Новый пароль" required>
            <button type="submit" class="btn">Изменить</button>
        </form>
        <p style="margin-top: 20px;"><a href="/profile/{{ current_user.username }}">← Назад в профиль</a></p>
    </div>
</body>
</html>
