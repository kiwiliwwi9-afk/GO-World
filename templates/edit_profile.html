<!DOCTYPE html>
<html>
<head>
    <title>Редактировать профиль — GO World</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌍 GO World</div>
        <div class="nav-links">
            <a href="/feed">Лента</a>
            <a href="/search">🔍 Найти</a>
            <a href="/profile/{{ current_user.username }}">Профиль</a>
            <a href="/logout">Выйти</a>
        </div>
    </nav>
    
    <div class="container">
        <h2>Редактировать профиль</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="POST" enctype="multipart/form-data">
            <textarea name="bio" placeholder="О себе" rows="4">{{ current_user.bio }}</textarea>
            <input type="file" name="avatar" accept="image/*">
            <button type="submit" class="btn">Сохранить</button>
        </form>
    </div>
</body>
</html>
