<!DOCTYPE html>
<html>
<head>
    <title>Поиск — GO World</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🌍 GO World</div>
        <div class="nav-links">
            <a href="/feed">Лента</a>
            <a href="/search">🔍 Найти</a>
            <a href="/profile/{{ current_user.username }}">Профиль</a>
            <a href="/logout">Выйти</a>
        </div>
    </nav>
    
    <div class="container">
        <h2>🔍 Найти людей</h2>
        <form method="GET">
            <input type="text" name="q" placeholder="Имя пользователя..." value="{{ query }}" style="width:100%; padding:12px; margin-bottom:20px; border-radius:10px; border:none;">
            <button type="submit" class="btn">Искать</button>
        </form>
        
        {% if users %}
            <div class="users-list">
                {% for user in users %}
                <div class="post" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <strong>{{ user.username }}</strong>
                        <p style="font-size:12px; opacity:0.7; margin-top:5px;">{{ user.bio[:50] or 'Нет описания' }}</p>
                    </div>
                    <a href="/profile/{{ user.username }}" class="btn" style="padding:5px 15px;">Перейти</a>
                </div>
                {% endfor %}
            </div>
        {% elif query %}
            <p>Никого не найдено</p>
        {% else %}
            <p>Введи имя пользователя для поиска</p>
        {% endif %}
    </div>
</body>
</html>
